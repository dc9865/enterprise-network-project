! =========================================================
! Device: CSW1
! Role: Core Switch
! =========================================================
! Purpose:
! - Acts as a Layer 3 core device in the enterprise backbone
! - Maintains routed adjacencies to R1 and all four distribution switches
! - Runs OSPF area 0 for dynamic routing
! - Uses EtherChannel to form a redundant routed core link to CSW2
! =========================================================


! =========================
! SYSTEM CONFIGURATION
! =========================
hostname CSW1

! Secure privileged EXEC access
enable secret 9 <hidden>

! Enable Layer 3 forwarding
ip routing

! Enable IPv6 routing
ipv6 unicast-routing

! Disabled in this lab environment / Packet Tracer build
no ip cef
no ipv6 cef


! =========================
! MANAGEMENT & ADMIN ACCESS
! =========================

! Local admin account
username cisco secret 9 <hidden>

! SSH settings
ip domain-name jeremysitlab.com
ip ssh version 2

! DNS server used in the lab
ip name-server 10.5.0.4

! Restrict remote management access to permitted subnet only
access-list 1 permit 10.1.0.0 0.0.0.255

line vty 0 4
 access-class 1 in
 logging synchronous
 login local
 transport input ssh

line vty 5 15
 access-class 1 in
 logging synchronous
 login local
 transport input ssh


! =========================
! DISCOVERY / LAYER 2 BEHAVIOR
! =========================

! LLDP enabled for neighbor discovery and topology verification
lldp run

! CDP disabled as a hardening choice in this lab
no cdp run

! Spanning-tree mode configured globally
spanning-tree mode pvst


! =========================
! LOOPBACK
! =========================

! Stable OSPF router ID source
interface Loopback0
 ip address 10.0.0.77 255.255.255.255


! =========================
! ROUTED ETHERCHANNEL TO CSW2
! =========================

! Port-channel1 is the Layer 3 bundled link to CSW2
interface Port-channel1
 no switchport
 ip address 10.0.0.41 255.255.255.252
 ipv6 enable

! Physical members of the EtherChannel to CSW2
interface GigabitEthernet1/0/2
 no switchport
 no ip address
 channel-group 1 mode desirable
 duplex auto
 speed auto

interface GigabitEthernet1/0/3
 no switchport
 no ip address
 channel-group 1 mode desirable
 duplex auto
 speed auto


! =========================
! ROUTED UPLINK TO EDGE ROUTER
! =========================

! Direct Layer 3 link to R1 G0/0
interface GigabitEthernet1/0/1
 no switchport
 ip address 10.0.0.34 255.255.255.252
 ip ospf network point-to-point
 ip ospf priority 1
 duplex auto
 speed auto
 ipv6 address 2001:DB8:A1::/64 eui-64


! =========================
! ROUTED LINKS TO DISTRIBUTION LAYER
! =========================

! Link to DSW-A1 Gi1/1/1
interface GigabitEthernet1/1/1
 no switchport
 ip address 10.0.0.45 255.255.255.252
 ip ospf network point-to-point
 ip ospf priority 1

! Link to DSW-A2 Gi1/1/1
interface GigabitEthernet1/1/2
 no switchport
 ip address 10.0.0.49 255.255.255.252
 ip ospf network point-to-point
 ip ospf priority 1

! Link to DSW-B1 Gi1/1/1
interface GigabitEthernet1/1/3
 no switchport
 ip address 10.0.0.53 255.255.255.252
 ip ospf network point-to-point
 ip ospf priority 1

! Link to DSW-B2 Gi1/1/1
interface GigabitEthernet1/1/4
 no switchport
 ip address 10.0.0.57 255.255.255.252
 ip ospf network point-to-point
 ip ospf priority 1


! =========================
! UNUSED INTERFACES
! =========================

! Administratively disable unused interfaces
interface range GigabitEthernet1/0/4 - 24
 shutdown


! =========================
! UNUSED SVI
! =========================

interface Vlan1
 no ip address
 shutdown


! =========================
! OSPF CONFIGURATION
! =========================

router ospf 1
 router-id 10.0.0.77
 log-adjacency-changes

 ! Loopback advertised but does not form adjacency
 passive-interface Loopback0

 ! Core-to-router and core-to-distribution routed links
 network 10.0.0.34 0.0.0.0 area 0
 network 10.0.0.41 0.0.0.0 area 0
 network 10.0.0.45 0.0.0.0 area 0
 network 10.0.0.49 0.0.0.0 area 0
 network 10.0.0.53 0.0.0.0 area 0
 network 10.0.0.57 0.0.0.0 area 0

 ! Loopback advertisement
 network 10.0.0.77 0.0.0.0 area 0


! =========================
! MONITORING / OPERATIONS
! =========================

! NetFlow export version
ip flow-export version 9

! SNMP read-only community
snmp-server community SNMPSTRING RO

! Remote syslog
logging trap debugging
logging 10.5.0.4


! =========================
! CONSOLE ACCESS
! =========================

line con 0
 exec-timeout 30 0
 logging synchronous
 login local

line aux 0


! =========================
! TIME SYNCHRONIZATION
! =========================

! Authenticated NTP
ntp authentication-key 1 md5 08224F4008 7
ntp trusted-key 1
ntp server 10.0.0.76 key 1


! =========================
! END OF CONFIG
! =========================
