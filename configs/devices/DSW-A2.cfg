! =========================================================
! Device: DSW-A2
! Role: Distribution Switch (Office A)
! =========================================================
! Purpose:
! - Secondary distribution switch for Office A
! - Provides Layer 3 gateway via SVIs (Standby for VLAN 10 & 99)
! - Active HSRP router for VLAN 20 (Phones) and VLAN 40 (WiFi)
! - Participates in OSPF with core layer
! - STP root for VLAN 20 & 40 (aligned with HSRP active)
! - EtherChannel (PAgP) peer with DSW-A1
! =========================================================


! =========================
! SYSTEM CONFIGURATION
! =========================
hostname DSW-A2

! Secure privileged EXEC access
enable secret 9 <hidden>

! Enable Layer 3 routing
ip routing

! Disabled due to lab/simulator constraints
no ip cef
no ipv6 cef


! =========================
! MANAGEMENT & ACCESS
! =========================

! Local admin account
username cisco secret 9 <hidden>

! SSH + DNS configuration
ip domain-name jeremysitlab.com
ip ssh version 2
ip name-server 10.5.0.4

! Restrict remote access to management subnet
access-list 1 permit 10.1.0.0 0.0.0.255

line vty 0 4
 access-class 1 in
 logging synchronous
 login local
 transport input ssh

line vty 5 15
 access-class 1 in
 logging synchronous
 login local
 transport input ssh


! =========================
! LAYER 2 CONTROL
! =========================

! Enable LLDP for topology verification
lldp run

! Disable CDP for security hardening
no cdp run

! Rapid Spanning Tree enabled
spanning-tree mode rapid-pvst

! STP Root alignment with HSRP design
! VLAN 20 & 40 → Active here (priority 0)
! VLAN 10 & 99 → Secondary (priority 4096)
spanning-tree vlan 20,40 priority 0
spanning-tree vlan 10,99 priority 4096


! =========================
! LOOPBACK
! =========================

! Used for stable OSPF router ID
interface Loopback0
 ip address 10.0.0.80 255.255.255.255


! =========================
! ETHERCHANNEL TO DSW-A1
! =========================

! Logical bundle (Po1)
interface Port-channel1
 switchport mode trunk
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate

! Unused / reserved Port-channel
interface Port-channel2
 shutdown

! Physical interfaces in EtherChannel (PAgP)
interface GigabitEthernet1/0/4
 switchport mode trunk
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate
 channel-group 1 mode desirable

interface GigabitEthernet1/0/5
 switchport mode trunk
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate
 channel-group 1 mode desirable


! =========================
! TRUNKS TO ACCESS LAYER
! =========================

! Based on LLDP:
! Gi1/0/1 → ASW-A1
! Gi1/0/2 → ASW-A2
! Gi1/0/3 → ASW-A3

interface GigabitEthernet1/0/1
 switchport mode trunk
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate

interface GigabitEthernet1/0/2
 switchport mode trunk
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate

interface GigabitEthernet1/0/3
 switchport mode trunk
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate


! =========================
! ROUTED LINKS TO CORE
! =========================

! Gi1/1/1 → CSW1
interface GigabitEthernet1/1/1
 no switchport
 ip address 10.0.0.50 255.255.255.252
 ip ospf network point-to-point
 ip ospf priority 1

! Gi1/1/2 → CSW2
interface GigabitEthernet1/1/2
 no switchport
 ip address 10.0.0.66 255.255.255.252
 ip ospf network point-to-point
 ip ospf priority 1


! =========================
! UNUSED INTERFACES
! =========================

interface range GigabitEthernet1/0/6 - 24
 shutdown

interface range GigabitEthernet1/1/3 - 4
 shutdown


! =========================
! SVIs (INTER-VLAN ROUTING + HSRP)
! =========================

! -------- VLAN 10 (PCs) --------
! Standby router (DSW-A1 is Active)
interface Vlan10
 ip address 10.1.0.3 255.255.255.0
 ip helper-address 10.0.0.76
 ip access-group OfficeA_to_OfficeB in

 standby version 2
 standby 2 ip 10.1.0.1

! -------- VLAN 20 (Phones) --------
! Active router (higher priority)
interface Vlan20
 ip address 10.2.0.3 255.255.255.0
 ip helper-address 10.0.0.76

 standby version 2
 standby 3 ip 10.2.0.1
 standby 3 priority 105
 standby 3 preempt

! -------- VLAN 40 (WiFi) --------
! Active router (higher priority)
interface Vlan40
 ip address 10.6.0.3 255.255.255.0
 ip helper-address 10.0.0.76

 standby version 2
 standby 4 ip 10.6.0.1
 standby 4 priority 105
 standby 4 preempt

! -------- VLAN 99 (Management) --------
! Standby router (DSW-A1 is Active)
interface Vlan99
 ip address 10.0.0.3 255.255.255.240
 ip helper-address 10.0.0.76

 standby version 2
 standby 1 ip 10.0.0.1


! =========================
! OSPF CONFIGURATION
! =========================

router ospf 1
 router-id 10.0.0.80
 log-adjacency-changes

 ! Prevent unnecessary adjacencies
 passive-interface Loopback0
 passive-interface Vlan10
 passive-interface Vlan20
 passive-interface Vlan40

 ! Advertise SVIs
 network 10.1.0.3 0.0.0.0 area 0
 network 10.2.0.3 0.0.0.0 area 0
 network 10.6.0.3 0.0.0.0 area 0
 network 10.0.0.3 0.0.0.0 area 0

 ! Core links
 network 10.0.0.50 0.0.0.0 area 0
 network 10.0.0.66 0.0.0.0 area 0

 ! Loopback
 network 10.0.0.80 0.0.0.0 area 0


! =========================
! ACCESS CONTROL
! =========================

! Restrict Office A → Office B communication (except ICMP)
ip access-list extended OfficeA_to_OfficeB
 permit icmp 10.1.0.0 0.0.0.255 10.3.0.0 0.0.0.255
 deny ip 10.1.0.0 0.0.0.255 10.3.0.0 0.0.0.255
 permit ip any any


! =========================
! MONITORING
! =========================

ip flow-export version 9
snmp-server community SNMPSTRING RO

logging trap debugging
logging 10.5.0.4


! =========================
! NTP
! =========================

ntp authentication-key 1 md5 08224F4008 7
ntp trusted-key 1
ntp server 10.0.0.76 key 1


! =========================
! CONSOLE ACCESS
! =========================

line con 0
 exec-timeout 30 0
 logging synchronous
 login local
