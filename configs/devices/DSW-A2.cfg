! =========================================================
! Device: DSW-A2
! Role: Distribution Switch (Office A)
! =========================================================
! Purpose:
! - Redundant distribution switch
! - EtherChannel (PAgP) peer with DSW-A1
! =========================================================

! =========================
! BASE CONFIGURATION
! =========================
hostname DSW-A2

enable secret 9 jeremylab

username cisco 9 secret ccna

line console 0
 login local
 exec-timeout 30 0
 logging synchronous

! =========================
! VTP CONFIGURATION
! =========================
vtp domain JeremysITLab
vtp mode server

! =========================
! ETHERCHANNEL (PAgP)
! =========================
interface range g1/0/4 - 5
 channel-group 1 mode desirable

interface port-channel 1
 switchport mode trunk
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate
 switchport trunk native vlan 1000

! =========================
! TRUNK LINKS TO ACCESS
! =========================
interface range g1/0/1 - 3
 switchport mode trunk
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate
 switchport trunk native vlan 1000

! =========================
! UNUSED PORTS (SECURITY)
! =========================
interface range g1/0/6 - 24, g1/1/3 - 4
 shutdown
