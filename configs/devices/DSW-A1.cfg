! =========================================================
! Device: DSW-A1
! Role: Distribution Switch (Office A)
! =========================================================
! Purpose:
! - Aggregates access switches (ASW-A1, ASW-A2, ASW-A3)
! - Provides Layer 3 gateway via SVIs
! - Runs HSRP for gateway redundancy (Active for VLAN 10 & 99)
! - Participates in OSPF with core layer
! - Acts as STP Root Bridge (aligned with HSRP)
! - Uses EtherChannel (PAgP) to DSW-A2
! =========================================================


! =========================
! SYSTEM CONFIGURATION
! =========================
hostname DSW-A1

enable secret 9 <hidden>

ip routing

! Packet Tracer limitation / lab choice
no ip cef
no ipv6 cef


! =========================
! MANAGEMENT & ACCESS
! =========================
username cisco secret 9 <hidden>

ip domain-name jeremysitlab.com
ip ssh version 2
ip name-server 10.5.0.4

access-list 1 permit 10.1.0.0 0.0.0.255

line vty 0 4
 access-class 1 in
 login local
 transport input ssh

line vty 5 15
 access-class 1 in
 login local
 transport input ssh


! =========================
! LAYER 2 CONTROL
! =========================

! Enable LLDP for topology validation
lldp run

! Disable CDP for security
no cdp run

! Rapid STP enabled for faster convergence
spanning-tree mode rapid-pvst

! Root bridge tuning (aligned with HSRP active VLANs)
spanning-tree vlan 10,99 priority 0
spanning-tree vlan 20,40 priority 4096


! =========================
! LOOPBACK
! =========================

! Used for OSPF router-id stability
interface Loopback0
 ip address 10.0.0.79 255.255.255.255


! =========================
! ETHERCHANNEL TO DSW-A2
! =========================

! Logical bundle
interface Port-channel1
 switchport mode trunk
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate

! Physical links (PAgP)
interface GigabitEthernet1/0/4
 switchport mode trunk
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate
 channel-group 1 mode desirable

interface GigabitEthernet1/0/5
 switchport mode trunk
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate
 channel-group 1 mode desirable


! =========================
! TRUNKS TO ACCESS LAYER
! =========================

! Links to ASW-A1, ASW-A2, ASW-A3 (based on LLDP)
interface GigabitEthernet1/0/1
 switchport mode trunk
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate

interface GigabitEthernet1/0/2
 switchport mode trunk
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate

interface GigabitEthernet1/0/3
 switchport mode trunk
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate


! =========================
! ROUTED LINKS TO CORE
! =========================

! Link to CSW1 (Gi1/1/1)
interface GigabitEthernet1/1/1
 no switchport
 ip address 10.0.0.46 255.255.255.252
 ip ospf network point-to-point
 ip ospf priority 1

! Link to CSW2 (Gi1/1/2)
interface GigabitEthernet1/1/2
 no switchport
 ip address 10.0.0.62 255.255.255.252
 ip ospf network point-to-point
 ip ospf priority 1


! =========================
! UNUSED INTERFACES
! =========================
interface range GigabitEthernet1/0/6 - 24
 shutdown

interface range GigabitEthernet1/1/3 - 4
 shutdown


! =========================
! VLAN INTERFACES (SVIs)
! =========================

! ================= VLAN 10 (PCs) =================
interface Vlan10
 ip address 10.1.0.2 255.255.255.0
 ip helper-address 10.0.0.76
 ip access-group OfficeA_to_OfficeB in

 standby version 2
 standby 2 ip 10.1.0.1
 standby 2 priority 105
 standby 2 preempt

! ================= VLAN 20 (Phones) =================
interface Vlan20
 ip address 10.2.0.2 255.255.255.0
 ip helper-address 10.0.0.76

 standby version 2
 standby 3 ip 10.2.0.1

! ================= VLAN 40 (WiFi) =================
interface Vlan40
 ip address 10.6.0.2 255.255.255.0
 ip helper-address 10.0.0.76

 standby version 2
 standby 4 ip 10.6.0.1

! ================= VLAN 99 (Management) =================
interface Vlan99
 ip address 10.0.0.2 255.255.255.240
 ip helper-address 10.0.0.76

 standby version 2
 standby 1 ip 10.0.0.1
 standby 1 priority 105
 standby 1 preempt


! =========================
! OSPF CONFIGURATION
! =========================

router ospf 1
 router-id 10.0.0.79
 log-adjacency-changes

 ! Prevent unnecessary adjacencies
 passive-interface Loopback0
 passive-interface Vlan10
 passive-interface Vlan20
 passive-interface Vlan40

 ! Core links
 network 10.0.0.46 0.0.0.0 area 0
 network 10.0.0.62 0.0.0.0 area 0

 ! SVIs advertised into OSPF
 network 10.1.0.2 0.0.0.0 area 0
 network 10.2.0.2 0.0.0.0 area 0
 network 10.6.0.2 0.0.0.0 area 0
 network 10.0.0.2 0.0.0.0 area 0

 ! Loopback
 network 10.0.0.79 0.0.0.0 area 0


! =========================
! ACCESS CONTROL (INTER-VLAN POLICY)
! =========================

ip access-list extended OfficeA_to_OfficeB
 permit icmp 10.1.0.0 0.0.0.255 10.3.0.0 0.0.0.255
 deny ip 10.1.0.0 0.0.0.255 10.3.0.0 0.0.0.255
 permit ip any any


! =========================
! MONITORING
! =========================

ip flow-export version 9
snmp-server community SNMPSTRING RO

logging trap debugging
logging 10.5.0.4


! =========================
! NTP
! =========================

ntp authentication-key 1 md5 08224F4008 7
ntp trusted-key 1
ntp server 10.0.0.76 key 1


! =========================
! CONSOLE
! =========================

line con 0
 exec-timeout 30 0
 logging synchronous
 login local
