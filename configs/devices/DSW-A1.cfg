! =========================================================
! Device: DSW-A1
! Role: Distribution Switch (Office A)
! =========================================================
! Purpose:
! - VLAN segmentation (Office A)
! - EtherChannel (PAgP) with DSW-A2
! - Trunking to Access switches
! - VTP Server
! =========================================================

! =========================
! BASE CONFIGURATION
! =========================
hostname DSW-A1

enable secret 9 jeremylab

username cisco secret 9 ccna

line console 0
 login local
 exec-timeout 30 0
 logging synchronous

! =========================
! VTP CONFIGURATION
! =========================
vtp domain JeremysITLab
vtp mode server

! =========================
! VLAN CONFIGURATION
! =========================
vlan 10
 name PCs

vlan 20
 name Phones

vlan 40
 name WiFi

vlan 99
 name Management

! =========================
! ETHERCHANNEL (PAgP)
! =========================
interface range g0/1 - 2
 channel-group 1 mode desirable

interface port-channel 1
 switchport mode trunk
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate

! =========================
! TRUNK LINKS TO ACCESS
! =========================
interface range g0/3 - 5
 switchport mode trunk
 switchport trunk allowed vlan 10,20,40,99
 switchport nonegotiate

! =========================
! UNUSED PORTS (SECURITY)
! =========================
interface range f0/10 - 24
 shutdown
