! =========================================================
! Device: ASW-B1
! Role: Access Switch (Office B)
! =========================================================
! Purpose:
! - Connects end devices in Office B
! - Provides VLAN access (Management VLAN)
! - Enforces Layer 2 security (DAI, DHCP Snooping, Port Security)
! - Dual uplinks to distribution layer (DSW-B1 / DSW-B2)
! =========================================================


! =========================
! SYSTEM CONFIGURATION
! =========================
hostname ASW-B1

! Secure privileged EXEC access
enable secret 5 <hidden>

! SSH configuration
ip domain-name jeremysitlab.com
ip ssh version 2

! DNS server
ip name-server 10.5.0.4

! Local authentication
username cisco secret 5 <hidden>


! =========================
! LAYER 2 SECURITY FEATURES
! =========================

! Enable Dynamic ARP Inspection on Office B VLANs
ip arp inspection vlan 10,20,30,99
ip arp inspection validate src-mac dst-mac ip

! Enable DHCP Snooping (prevents rogue DHCP servers)
ip dhcp snooping vlan 10,20,30,99

! Disable Option 82
no ip dhcp snooping information option

! Enable DHCP Snooping globally
ip dhcp snooping


! =========================
! DISCOVERY & STP
! =========================

! Enable LLDP for topology verification
lldp run

! Rapid Spanning Tree for fast convergence
spanning-tree mode rapid-pvst
spanning-tree extend system-id


! =========================
! ACCESS PORT (END DEVICE)
! =========================

! -------- Fa0/1 → End Device (Management VLAN) --------
interface FastEthernet0/1

 ! Management VLAN access
 switchport access vlan 99

 ! Present in running config (no operational effect in access mode)
 switchport trunk native vlan 1000

 ! Limit DHCP rate (prevents starvation attacks)
 ip dhcp snooping limit rate 15

 ! Disable LLDP transmit (reduce info exposure)
 no lldp transmit

 ! Force access mode
 switchport mode access
 switchport nonegotiate

 ! Port security enabled
 switchport port-security

 ! Sticky learning of MAC addresses
 switchport port-security mac-address sticky

 ! Restrict traffic instead of shutting port on violation
 switchport port-security violation restrict

 ! Predefined sticky MAC (known endpoint)
 switchport port-security mac-address sticky 00E0.F9EA.1401

 ! Optimize for edge device
 spanning-tree portfast

 ! Protect from rogue switches
 spanning-tree bpduguard enable


! =========================
! UNUSED ACCESS PORTS
! =========================

! Shutdown unused ports for security
interface range FastEthernet0/2 - 24
 shutdown


! =========================
! UPLINKS TO DISTRIBUTION
! =========================

! Based on LLDP:
! Gi0/1 → DSW-B1
! Gi0/2 → DSW-B2

interface GigabitEthernet0/1

 ! Trunk uplink to DSW-B1
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,30,99

 ! Trust upstream infrastructure for DHCP and ARP
 ip dhcp snooping trust
 ip arp inspection trust

 switchport mode trunk
 switchport nonegotiate


interface GigabitEthernet0/2

 ! Redundant trunk uplink to DSW-B2
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,30,99

 ip dhcp snooping trust
 ip arp inspection trust

 switchport mode trunk
 switchport nonegotiate


! =========================
! MANAGEMENT VLAN
! =========================

interface Vlan1
 no ip address
 shutdown

interface Vlan99
 ip address 10.0.0.20 255.255.255.240

! Default gateway (HSRP virtual IP)
ip default-gateway 10.0.0.17


! =========================
! HARDENING
! =========================

! Disable CDP to reduce attack surface
no cdp run


! =========================
! MONITORING
! =========================

logging trap debugging
logging 10.5.0.4

snmp-server community SNMPSTRING RO


! =========================
! REMOTE ACCESS CONTROL
! =========================

! Restrict management access
access-list 1 permit 10.1.0.0 0.0.0.255

line vty 0 4
 access-class 1 in
 logging synchronous
 login local
 transport input ssh

line vty 5 15
 access-class 1 in
 logging synchronous
 login local
 transport input ssh


! =========================
! CONSOLE ACCESS
! =========================

line con 0
 logging synchronous
 login local
 exec-timeout 30 0


! =========================
! TIME SYNCHRONIZATION
! =========================

ntp trusted-key 1
ntp server 10.0.0.76 key 1
