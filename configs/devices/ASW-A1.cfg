! =========================================================
! Device: ASW-A1
! Role: Access Switch (Office A)
! =========================================================
! Purpose:
! - Connect end devices (AP, WLC)
! - VLAN assignment
! =========================================================

! =========================
! BASE CONFIGURATION
! =========================
hostname ASW-A1

enable secret 5 jeremylab

username cisco secret 5 ccna

line console 0
 login local
 exec-timeout 30 0
 logging synchronous

! =========================
! VTP CONFIGURATION
! =========================
vtp mode client

! =========================
! ACCESS PORT CONFIG
! =========================
interface f0/1
 switchport mode access
 switchport access vlan 99
 spanning-tree portfast
 switchport nonegotiate

! =========================
! TRUNK TO DISTRIBUTION
! =========================
interface range g0/1 - 2
 switchport mode trunk
 switchport nonegotiate
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99

! =========================
! UNUSED PORTS
! =========================
interface range f0/3 - 24
 shutdown
