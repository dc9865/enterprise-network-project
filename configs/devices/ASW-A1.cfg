! =========================================================
! Device: ASW-A1
! Role: Access Switch (Office A)
! =========================================================
! Purpose:
! - Connects end devices (AP, WLC)
! - Enforces Layer 2 security policies
! - Provides VLAN access and trunk uplinks to distribution layer
! - Implements DHCP Snooping, DAI, and Port Security
! =========================================================


! =========================
! SYSTEM CONFIGURATION
! =========================
hostname ASW-A1

! Secure privileged EXEC access
enable secret 5 <hidden>

! SSH configuration
ip domain-name jeremysitlab.com
ip ssh version 2

! DNS server
ip name-server 10.5.0.4

! Local user authentication
username cisco secret 5 <hidden>


! =========================
! LAYER 2 SECURITY FEATURES
! =========================

! Enable Dynamic ARP Inspection (DAI) on user VLANs
ip arp inspection vlan 10,20,40,99

! Validate ARP packets (prevents spoofing)
ip arp inspection validate src-mac dst-mac ip

! Enable DHCP Snooping on user VLANs
ip dhcp snooping vlan 10,20,40,99

! Disable option 82 insertion
no ip dhcp snooping information option

! Globally enable DHCP Snooping
ip dhcp snooping


! =========================
! DISCOVERY & STP
! =========================

! Enable LLDP for topology verification
lldp run

! Rapid STP for fast convergence
spanning-tree mode rapid-pvst
spanning-tree extend system-id


! =========================
! ACCESS PORT CONFIGURATION
! =========================

! -------- Fa0/1 → End Device (likely PC or management host) --------
interface FastEthernet0/1

 ! Assign to management VLAN
 switchport access vlan 99

 ! Limit DHCP request rate (prevents DHCP starvation attacks)
 ip dhcp snooping limit rate 15

 ! Disable LLDP transmission (reduce exposure)
 no lldp transmit

 ! Access mode (no trunk negotiation)
 switchport mode access
 switchport nonegotiate

 ! Enable port security
 switchport port-security
 switchport port-security mac-address sticky
 switchport port-security violation restrict

 ! Pre-learned sticky MAC (specific device allowed)
 switchport port-security mac-address sticky 0002.4AE7.1601

 ! STP edge port optimization
 spanning-tree portfast

 ! Protect against rogue switches
 spanning-tree bpduguard enable


! -------- Fa0/2 → Likely Wireless AP (WiFi VLAN + Mgmt VLAN) --------
interface FastEthernet0/2

 ! Trunk to support WiFi + Management VLANs
 switchport trunk native vlan 99
 switchport trunk allowed vlan 40,99

 ! Higher DHCP rate (AP may relay multiple clients)
 ip dhcp snooping limit rate 100

 switchport mode trunk
 switchport nonegotiate

 ! Treat as edge trunk (faster convergence)
 spanning-tree portfast trunk

 ! Prevent rogue switch insertion
 spanning-tree bpduguard enable


! =========================
! UNUSED ACCESS PORTS
! =========================

! Shutdown unused interfaces (security best practice)
interface range FastEthernet0/3 - 24
 shutdown


! =========================
! UPLINKS TO DISTRIBUTION
! =========================

! Based on LLDP:
! Gi0/1 → DSW-A1
! Gi0/2 → DSW-A2

interface GigabitEthernet0/1

 ! Trunk to distribution layer
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99

 ! Trust DHCP server responses from upstream
 ip dhcp snooping trust

 ! Trust ARP from upstream devices
 ip arp inspection trust

 switchport mode trunk
 switchport nonegotiate


interface GigabitEthernet0/2

 ! Redundant trunk to second distribution switch
 switchport trunk native vlan 1000
 switchport trunk allowed vlan 10,20,40,99

 ip dhcp snooping trust
 ip arp inspection trust

 switchport mode trunk
 switchport nonegotiate


! =========================
! MANAGEMENT VLAN
! =========================

interface Vlan99
 ip address 10.0.0.4 255.255.255.240

! Default gateway (HSRP virtual IP)
ip default-gateway 10.0.0.1


! =========================
! HARDENING
! =========================

! Disable CDP for security
no cdp run


! =========================
! MONITORING
! =========================

logging trap debugging
logging 10.5.0.4

snmp-server community SNMPSTRING RO


! =========================
! REMOTE ACCESS CONTROL
! =========================

! Restrict management access
access-list 1 permit 10.1.0.0 0.0.0.255

line vty 0 4
 access-class 1 in
 logging synchronous
 login local
 transport input ssh

line vty 5 15
 access-class 1 in
 logging synchronous
 login local
 transport input ssh


! =========================
! CONSOLE ACCESS
! =========================

line con 0
 logging synchronous
 login local
 exec-timeout 30 0


! =========================
! TIME SYNCHRONIZATION
! =========================

ntp trusted-key 1
ntp server 10.0.0.76 key 1
